<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Eirik Christiansen IT Administrator Portfolio">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#07090d" offset="0"/>
      <stop stop-color="#0f1724" offset="1"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop stop-color="#38bdf8" offset="0"/>
      <stop stop-color="#22c55e" offset="0.64"/>
      <stop stop-color="#facc15" offset="1"/>
    </linearGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0v54" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="980" cy="96" r="260" fill="#38bdf8" opacity=".13"/>
  <circle cx="110" cy="570" r="220" fill="#22c55e" opacity=".10"/>
